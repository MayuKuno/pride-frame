service: pride-frame-backend
provider:
  name: aws
  runtime: nodejs18.x
  region: ap-northeast-1
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowedHeaders:
        - Content-Type
  environment:
    BUCKET_NAME: pride-frame-images  # 環境変数：S3バケット名
    TABLE_NAME: PrideFrameGallery    # 環境変数：DynamoDBテーブル名

  iamRoleStatements:
    # LambdaがS3にアクセスするための権限（オブジェクトのPUT/GET）
    - Effect: Allow
      Action:
        - s3:PutObject
        - s3:GetObject
      Resource: arn:aws:s3:::pride-frame-images/*
    # LambdaがDynamoDBにアクセスするための権限（アイテムの書き込み・全件取得）
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:Scan
        - dynamodb:GetItem
      Resource:
        - arn:aws:dynamodb:ap-northeast-1:*:table/PrideFrameGallery

functions:
  generateUploadUrl:
    handler: functions/generateUploadUrl.handler  # S3の署名付きURLを生成するLambda関数
    events:
      - httpApi:
          path: /generate-upload-url         
          method: post                      

  addGalleryItem:
    handler: functions/addGalleryItem.handler # DynamoDBにギャラリー情報を保存するLambda関数
    events:
      - httpApi:
          path: /add-gallery-item       
          method: post                     

  listGalleryItems:
    handler: functions/listGalleryItems.handler
    events:
      - httpApi:
          path: /list-gallery-items
          method: get

  getGalleryItemById:
    handler: functions/getGalleryItemById.handler
    events:
      - httpApi:
          path: /get-gallery-item/{id}
          method: get

resources:
  Resources:
    PrideFrameGalleryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: PrideFrameGallery        # 作成するDynamoDBテーブル名
        AttributeDefinitions:
          - AttributeName: id               # プライマリキーの属性名
            AttributeType: S                # プライマリキーのデータ型（文字列）
        KeySchema:
          - AttributeName: id               # プライマリキーの定義
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST        # オンデマンド課金（プロビジョニング不要）

    PrideFrameImagesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: pride-frame-images      # 作成するS3バケット名
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']        # CORS設定：全てのヘッダーを許可
              AllowedMethods: ['GET', 'PUT'] # CORS設定：GET・PUTメソッドを許可
              AllowedOrigins: ['*']        # CORS設定：全オリジンを許可
              MaxAge: 3000                 # プリフライトリクエストのキャッシュ時間（秒）
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false

    PrideFrameImagesBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref PrideFrameImagesBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: arn:aws:s3:::pride-frame-images/*